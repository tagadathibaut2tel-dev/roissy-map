<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roissy Chat GPS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
html,body,#map{
 height:100%;
 margin:0;
}

#login{
 position:absolute;
 z-index:1000;
 top:10px;
 left:10px;
 background:white;
 padding:10px;
 border-radius:8px;
 box-shadow:0 2px 8px rgba(0,0,0,.2);
}

#players{
 position:absolute;
 top:10px;
 right:10px;
 z-index:1000;
 background:white;
 padding:10px;
 border-radius:8px;
 max-width:220px;
 box-shadow:0 2px 8px rgba(0,0,0,.2);
}
</style>
</head>
<body>
<div id="login">
<b>Roissy Chat GPS</b><br><br>
<input id="pseudo" placeholder="Pseudo">
<button onclick="startGame()">Rejoindre</button>
</div>
  <div id="players">
<b>Joueurs</b>
<div id="playerList"></div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase, ref, set, onValue, remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpjvldVHJg2yBaFvdh2Pw-wgC21DVHC4w",
  authDomain: "roissy-chat-9462e.firebaseapp.com",
  databaseURL: "https://roissy-chat-9462e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "roissy-chat-9462e",
  storageBucket: "roissy-chat-9462e.firebasestorage.app",
  messagingSenderId: "513959735563",
  appId: "1:513959735563:web:183925e948dadb9a0bb20e",
  measurementId: "G-LXWSD3DVQ7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const map = L.map('map').setView([48.79,2.65],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

let playerName="";
let playerId="";
const markers={};
  const redIcon = new L.Icon({
 iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
 shadowUrl:"https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png",
 iconSize:[25,41],
 iconAnchor:[12,41]
});

const greenIcon = new L.Icon({
 iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
 shadowUrl:"https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png",
 iconSize:[25,41],
 iconAnchor:[12,41]
});
 
console.log("script chargé");
window.startGame=function(){
 const pseudo=document.getElementById("pseudo").value.trim();
 if(!pseudo){ alert("Entre un pseudo"); return; }

 playerName=pseudo;
 playerId=playerName+"_"+Math.random().toString(36).slice(2,7);

 window.addEventListener("beforeunload",()=>{
   remove(ref(db,"players/"+playerId));
 });

 document.getElementById("login").style.display="none";
 startGPS();
 watchPlayers();
}

function startGPS(){
 navigator.geolocation.watchPosition(
  (pos)=>{
   const lat=pos.coords.latitude;
   const lng=pos.coords.longitude;

   console.log("Accuracy:",pos.coords.accuracy);

   if(pos.coords.accuracy>10000){
     console.log("Position ignorée");
     return;
   }

  set(ref(db,"players/"+playerId),{
  name: playerName,
  lat: lat,
  lng: lng,
  timestamp: Date.now()
});

   map.setView([lat,lng],16);
  },
  (err)=>{
   alert("GPS : "+err.message);
  },
  {enableHighAccuracy:true}
 );
}

function watchPlayers(){

 onValue(ref(db,"players"),(snapshot)=>{

  const players = snapshot.val() || {};

  let playerListHTML = "";

  // Supprime tous les marqueurs actuels
  for(const id in markers){
    map.removeLayer(markers[id]);
    delete markers[id];
  }

  for(const name in players){

   const p = players[name];

   const age = Date.now() - (p.timestamp || 0);

   if(age > 60000) continue;

  playerListHTML += (p.name || name) + "<br>";

   const icon =
      name === playerId
      ? redIcon
      : greenIcon;

   markers[name] = L.marker(
      [p.lat,p.lng],
      {icon}
   ).addTo(map);

  markers[name].bindTooltip(
  p.name || name,
      {
       permanent:true,
       direction:"top",
       offset:[0,-10]
      }
   );
  }

  document.getElementById("playerList").innerHTML =
    playerListHTML;

 });

}
</script>
</body>
</html>
