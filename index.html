<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Roissy Chat GPS</title> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
html,body,#map{
 height:100%;
 margin:0;
}

button{
 font-size:18px;
 padding:10px 15px;
 border-radius:8px;
 border:none;
 cursor:pointer;
}

input{
 font-size:18px;
 padding:10px;
 width:180px;
 border-radius:8px;
 border:1px solid #ccc;
}

#login{
 position:absolute;
 z-index:1000;
 top:10px;
 left:10px;
 background:white;
 padding:10px;
 border-radius:8px;
 box-shadow:0 2px 8px rgba(0,0,0,.2);
}

#players{
 position:absolute;
 top:120px;
 right:10px;
 z-index:1000;
 background:white;
 padding:10px;
 border-radius:8px;
 max-width:220px;
 max-height:250px;
 overflow-y:auto;
 box-shadow:0 2px 8px rgba(0,0,0,.2);
}
@media (max-width:700px){

 #players{
  top:auto;
  bottom:10px;
  right:10px;
  width:180px;
 }

 #login{
 width:170px;
 padding:8px;
}

 button{
  font-size:20px;
 }

input{
 width:140px;
}

}
</style>
</head>
<body>
 <b id="title"
style="
position:absolute;
top:10px;
right:10px;
z-index:2000;
background:white;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
">
Roissy Chat GPS
</b>
<div id="login">

<h2>Roissy Chat GPS</h2>

<input id="pseudo" placeholder="Pseudo">

<br><br>

<button onclick="startGame('normal')">
🎮 Mode Normal
</button>

<br><br>

<button onclick="startGame('chat')">
🐱 Mode Chat Famille
</button>

</div>
  <div id="players">
<b>Joueurs</b>

<div id="catsCount"></div>
<div id="playerList"></div>
</div>
 <div id="announcement" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border:3px solid black;
border-radius:10px;
z-index:9999;
max-width:400px;
text-align:center;
">

<h2>📢 information </h2>

<div id="announcementText"></div>

<br>

<button onclick="
document.getElementById('announcement').style.display='none'
">
OK
</button>

</div>

 <div id="adminPanel" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,.3);
z-index:9999;
width:300px;
">

<h2>⚙️ Administration</h2>

<input id="adminMessage"
placeholder="Message à envoyer"
style="width:95%;margin-bottom:10px;">

<br>

<hr>

<h3>🤖 Bots</h3>
<div id="botList"
style="
max-height:150px;
overflow-y:auto;
border:1px solid #ccc;
padding:5px;
margin-bottom:10px;
">
</div>

<button onclick="createBot()">
➕ Créer un bot
</button>

<button onclick="renameBot()">
✏️ Renommer
</button>

<button onclick="deleteBot()">
🗑️ Supprimer
</button>

<button onclick="moveBot()">
📍 Déplacer
</button>  

<button onclick="sendAnnouncement()">
📢 Envoyer
</button>

<hr>


<button onclick="
document.getElementById('adminPanel').style.display='none'
">
❌ Fermer
</button>

</div>

 <div id="catButton"
style="
display:none;
position:absolute;
bottom:10px;
left:10px;
z-index:2000;
">

<button onclick="catTouched()">
🐱 Je suis touché
</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase, ref, set, onValue, remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpjvldVHJg2yBaFvdh2Pw-wgC21DVHC4w",
  authDomain: "roissy-chat-9462e.firebaseapp.com",
  databaseURL: "https://roissy-chat-9462e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "roissy-chat-9462e",
  storageBucket: "roissy-chat-9462e.firebasestorage.app",
  messagingSenderId: "513959735563",
  appId: "1:513959735563:web:183925e948dadb9a0bb20e",
  measurementId: "G-LXWSD3DVQ7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const map = L.map('map').setView([48.79,2.65],13);
map.on("click",(e)=>{

 selectedMapPosition = e.latlng;

 if(moveBotMode && selectedBot){

   const bot = botsData[selectedBot];

   set(
     ref(db,"bots/"+selectedBot),
     {
       ...bot,
       lat:e.latlng.lat,
       lng:e.latlng.lng
     }
   );

   moveBotMode = false;

   alert("Bot déplacé");
 }

});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

let playerName="";
let playerId="";
let gameMode = "normal"; 
let dbPath = "players"; 
let touched = false; 
const markers={};
const botsData = {}; 
let adminClicks = 0;
let selectedBot = "";
let moveBotMode = false; 
let selectedMapPosition = null; 
 
document.addEventListener("DOMContentLoaded",()=>{

 document.getElementById("title")
 .addEventListener("click",()=>{

   adminClicks++;

   if(adminClicks >= 3){
     adminClicks = 0;
     organizerMenu();
   }

   setTimeout(()=>{
     adminClicks = 0;
   },2000);

 });

});
 
 
let lastAnnouncement = 0; 
 
  const redIcon = new L.Icon({
 iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
 shadowUrl:"https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png",
 iconSize:[25,41],
 iconAnchor:[12,41]

});


const greenIcon = new L.Icon({
 iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
 shadowUrl:"https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png",
 iconSize:[25,41],
 iconAnchor:[12,41]
});
const catIcon = new L.Icon({
 iconUrl:"https://cdn-icons-png.flaticon.com/512/616/616430.png",
 iconSize:[40,40],
 iconAnchor:[20,40]
});


console.log("script chargé");
window.startGame=function(mode){

 gameMode = mode;
 if(mode === "chat"){
 dbPath = "cats";
}else{
 dbPath = "players";
}
 const pseudo=document.getElementById("pseudo").value.trim();
 if(!pseudo){ alert("Entre un pseudo"); return; }

 playerName=pseudo;
 playerId=playerName+"_"+Math.random().toString(36).slice(2,7);

 window.addEventListener("beforeunload",()=>{
remove(ref(db,dbPath+"/"+playerId));
 });

 document.getElementById("login").style.display="none";
if(mode === "chat"){
 document.getElementById("catButton").style.display =
 "block";
} 
startGPS();
watchBots();
watchAnnouncements();
}
window.organizerMenu=function(){

 const code = prompt("Code organisateur");

 if(code !== "13579"){
   alert("Code incorrect");
   return;
 }

 document.getElementById(
   "adminPanel"
 ).style.display = "block";

}

window.renameBot = function(){

 if(!selectedBot){
   alert("Sélectionne un bot");
   return;
 }

 const nouveauNom =
 prompt("Nouveau nom ?");

 if(!nouveauNom) return;

 const bot = botsData[selectedBot];

 set(
   ref(db,"bots/BOT_"+nouveauNom),
   {
     ...bot,
     name:nouveauNom
   }
 );

 remove(
   ref(db,"bots/"+selectedBot)
 );

 selectedBot = "";

} 
 
let firstPosition = true;
 
function startGPS(){
 navigator.geolocation.watchPosition(
  (pos)=>{
   const lat=pos.coords.latitude;
   const lng=pos.coords.longitude;

   console.log("Accuracy:",pos.coords.accuracy);

   if(pos.coords.accuracy>10000){
     console.log("Position ignorée");
     return;
   }

set(ref(db,dbPath+"/"+playerId),{
 name: playerName,
 lat: lat,
 lng: lng,
 timestamp: Date.now(),
 mode: gameMode,
 touched: touched
});
if(firstPosition){
 map.setView([lat,lng],16);
 firstPosition = false;
}
  },
  (err)=>{
   alert("GPS : "+err.message);
  },
  {enableHighAccuracy:true}
 );
}



function watchPlayers(){

 onValue(ref(db,dbPath),(snapshot)=>{

  const players = snapshot.val() || {};

  let playerListHTML = "";
  let cats = 0;

  // Supprime uniquement les marqueurs des joueurs
  for(const id in markers){

   if(id.startsWith("BOT_")){
     continue;
   }

   map.removeLayer(markers[id]);
   delete markers[id];
  }

  for(const name in players){

   const p = players[name];

   playerListHTML += `
   <div onclick="focusPlayer('${name}')"
   style="
   cursor:pointer;
   padding:4px;
   border-bottom:1px solid #ddd;
   ">
   <span style="
   color:${p.touched ? 'red':'black'};
   font-weight:bold;
   ">
   ${p.name || name}
   </span>
   </div>
   `;

   let icon = greenIcon;

   if(p.touched){
     icon = catIcon;
     cats++;
   }

   if(name === playerId){
     icon = redIcon;
   }

   markers[name] = L.marker(
      [p.lat,p.lng],
      {icon}
   ).addTo(map);

   markers[name].bindTooltip(
      p.name || name,
      {
       permanent:true,
       direction:"top",
       offset:[0,-10]
      }
   );
  }

  // Ajout des bots dans la liste des joueurs
  for(const id in botsData){

   const bot = botsData[id];

   playerListHTML += `
   <div
   onclick="focusPlayer('${id}')"
   style="
   cursor:pointer;
   padding:4px;
   border-bottom:1px solid #ddd;
   color:blue;
   ">
   ${bot.name}
   </div>
   `;
  }

  document.getElementById("playerList").innerHTML =
  playerListHTML;

  document.getElementById("catsCount").innerHTML =
  "🐱 Chats touchés : " + cats;

 });

}


playerListHTML += `
<div onclick="focusPlayer('${name}')"
style="
cursor:pointer;
padding:4px;
border-bottom:1px solid #ddd;
">
<span style="
color:${p.touched ? 'red':'black'};
font-weight:bold;
">
${p.name || name}
</span>
</div>
`;

let icon = greenIcon;

if(p.touched){
 icon = catIcon;
 cats++;
}

if(name === playerId){
 icon = redIcon;
}

   markers[name] = L.marker(
      [p.lat,p.lng],
      {icon}
   ).addTo(map);

  markers[name].bindTooltip(
  p.name || name,
      {
       permanent:true,
       direction:"top",
       offset:[0,-10]
      }
   );

}
 for(const id in botsData){

 const bot = botsData[id];

 playerListHTML += `
 <div
 onclick="focusPlayer('${id}')"
 style="
 cursor:pointer;
 padding:4px;
 border-bottom:1px solid #ddd;
 color:black;
 ">
 {bot.name}
 </div>
 `;
}
  document.getElementById("playerList").innerHTML =
    playerListHTML;
 const botList =
document.getElementById("botList");

if(botList){
 botList.innerHTML = botListHTML;
}

  document.getElementById("catsCount").innerHTML =
"🐱 Chats touchés : " + cats;

 });

}

window.focusPlayer = function(id){

 const marker = markers[id];

 if(!marker) return;

 map.flyTo(
   marker.getLatLng(),
   18,
   {
     duration:1
   }
 );

 marker.openTooltip();

}

window.createBot = function(){

 const name = prompt("Nom du bot ?");

 if(!name) return;

 const center = map.getCenter();

 set(
   ref(db,"bots/BOT_"+name),
   {
     name:name,
     lat:center.lat,
     lng:center.lng,
     timestamp:Date.now(),
     bot:true
   }
 );

 alert("Bot créé");

}
window.deleteBot = function(){

 if(!selectedBot){
   alert("Sélectionne un bot");
   return;
 }

 remove(
   ref(db,"bots/"+selectedBot)
 );

 selectedBot = "";

 alert("Bot supprimé");

}
 window.sendAnnouncement=function(){

 const message =
 document.getElementById(
   "adminMessage"
 ).value;

 if(!message) return;

 set(
   ref(db,"announcement"),
   {
     text:message,
     timestamp:Date.now()
   }
 );

 document.getElementById(
   "adminPanel"
 ).style.display = "none";

 document.getElementById(
   "adminMessage"
 ).value = "";

}

window.catTouched = function(){

 touched = true;

 set(
   ref(db,dbPath+"/"+playerId),
   {
     name:playerName,
     lat:markers[playerId]
       ? markers[playerId].getLatLng().lat
       : 0,
     lng:markers[playerId]
       ? markers[playerId].getLatLng().lng
       : 0,
     timestamp:Date.now(),
     mode:"chat",
     touched:true
   }
 );

}

function watchBots(){

 onValue(ref(db,"bots"),(snapshot)=>{

   const bots = snapshot.val() || {};

 let botListHTML = "";

   for(const id in bots){

     const p = bots[id];

botListHTML += `
<div
onclick="selectBot('${id}')"
style="
padding:5px;
margin:2px;
border:1px solid #ccc;
cursor:pointer;
">
${p.name}
</div>
`;    

botsData[id] = p;

     if(markers[id]){
       map.removeLayer(markers[id]);
     }

     markers[id] = L.marker(
       [p.lat,p.lng],
       {icon:greenIcon}
     ).addTo(map);

    markers[id].bindTooltip(
 p.name,
 {
   permanent:true,
   direction:"top",
   offset:[0,-25]
 }
);

   }

document.getElementById("botList").innerHTML =
botListHTML; 
document.getElementById("botList").innerHTML =
botListHTML;

 });

}



window.selectBot = function(id){

 selectedBot = id;

 const bot = botsData[id];

 if(bot){
   alert("Bot sélectionné : " + bot.name);
 }

}

window.moveBot = function(){

 if(!selectedBot){
   alert("Sélectionne un bot");
   return;
 }

 moveBotMode = true;

 alert(
   "Clique maintenant sur la carte pour déplacer le bot"
 );

}
 
function watchAnnouncements(){

 onValue(ref(db,"announcement"),(snapshot)=>{

   const data = snapshot.val();

   if(!data) return;

   if(data.timestamp === lastAnnouncement){
     return;
   }

   lastAnnouncement = data.timestamp;

   document.getElementById(
     "announcementText"
   ).innerText = data.text;

   document.getElementById(
     "announcement"
   ).style.display = "block";

 });

}
</script>
</body>
</html>
